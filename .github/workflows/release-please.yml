# =============================================================================
# Release Please - Automated Version Management
# =============================================================================
# Creates release PRs with changelogs when commits land on main.
# When a release PR is merged, creates a GitHub release which triggers
# release.yml for building packages (via version tag).
#
# Trigger pattern (shared with seed, stem, niac):
#   - workflow_run on CI completion: real trigger; gated on success
#   - workflow_dispatch: manual debug / force trigger
#
# Versioning behaviour is driven by .github/release-please-config.json
# and .release-please-manifest.json so that release-please knows
# the current version and applies the same changelog grouping across
# all three projects.
# =============================================================================

name: Release Please

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    # Only run if CI workflow succeeded (or this is a manual dispatch).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          # Short-lived GitHub App installation token (msn-ci-bot), minted
          # per-run. Unlike GITHUB_TOKEN, an App-authored tag/PR triggers
          # downstream workflows (release PR CI, release.yml's v* tag build).
          # App tokens sidestep the org's fine-grained-PAT >366-day rule that
          # rejected RELEASE_PLEASE_TOKEN. Fleet-standard (seed/stem/niac/niac-java).
          token: ${{ steps.app-token.outputs.token }}
          release-type: go
          config-file: .github/release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Output release info
        if: steps.release.outputs.release_created
        env:
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          echo "Release created: ${TAG_NAME}"
          echo "Version: ${VERSION}"

  trigger-release:
    name: Trigger Release Build
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger release workflow
        env:
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          echo "Release ${TAG_NAME} created"
          echo "The release.yml workflow will be triggered by the new tag"
